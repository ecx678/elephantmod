<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setting up...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f6f8fa;
            color: #24292f;
        }
        .container {
            text-align: center;
        }
        a {
            color: #0969da;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <p>Setting up installation...</p>
        <p id="status">Processing...</p>
    </div>

    <script>
        // Hämta installation_id från URL-parametrarna
        const urlParams = new URLSearchParams(window.location.search);
        const installationId = urlParams.get('installation_id');

        if (installationId) {
            // Spara installation_id i localStorage
            localStorage.setItem('installation_id', installationId);
            
            // Visa status
            document.getElementById('status').textContent = 'Installation ID saved: ' + installationId;
            
            // Redirect till GitHub installations sida
            setTimeout(() => {
                window.location.href = "https://github.com/settings/installations/" + installationId;
            }, 1500);
        } else {
            document.getElementById('status').textContent = 'No installation_id provided in URL';
        }
    </script>
</body>
</html>
